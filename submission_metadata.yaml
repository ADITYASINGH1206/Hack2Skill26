# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our system is a highly optimized, two-phase hybrid ranking engine. 
  Phase 1 (Offline Preprocessing): Applies strict data engineering guardrails to drop Honeypot records (structural contradictions), Title Traps (regex filtering for non-tech roles), and logistical mismatches (notice periods/experience bounds). It then generates dense semantic embeddings (Sentence-Transformers) and a BM25 sparse index offline, exporting them as binary artifacts.
  Phase 2 (Runtime Inference - rank.py): Executes offline strictly on CPU in under 30 seconds. It loads the pre-computed arrays and calculates a composite score fusing FAISS semantic distances with BM25 lexical matches. Scores are normalized to a bounded [0,1] scale, and ties are resolved deterministically via alphanumeric sorting to ensure strict monotonicity.

